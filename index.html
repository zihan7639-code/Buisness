<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBI | Business Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .active { display: flex; flex-direction: column; }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f0f2f5] text-gray-900 font-sans min-h-screen">

    <div id="step1" class="step active fixed inset-0 bg-gray-900 z-50 items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-4 text-red-600">Verification Required</h2>
            <p class="text-gray-600 mb-6">Subcribe to our channel to access the Business Manager.</p>
            <button id="subBtn" onclick="startVerification()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">SUBSCRIBE NOW</button>
            <div id="loadingBox" class="hidden mt-4 items-center justify-center space-x-3">
                <div class="loader"></div>
                <p id="timerText" class="text-red-600 font-bold">Checking: 15s</p>
            </div>
        </div>
    </div>

    <div id="step2" class="step fixed inset-0 bg-white z-40 items-center justify-center p-4">
        <div class="max-w-sm w-full border border-gray-300 p-10 rounded-lg text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="w-24 mx-auto mb-6" alt="Google">
            <h2 class="text-2xl mb-2">Sign in</h2>
            <p class="mb-8">Use your Google Account</p>
            <input type="email" placeholder="Email or phone" class="w-full p-3 border border-gray-300 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <div class="flex justify-between items-center mt-6">
                <button class="text-blue-600 font-bold">Create account</button>
                <button onclick="showStep('step3')" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Next</button>
            </div>
        </div>
    </div>

    <div id="step3" class="step min-h-screen bg-gray-50">
        <nav class="bg-white shadow-sm p-4 flex items-center justify-between sticky top-0">
            <div class="flex items-center space-x-4">
                <span class="text-xl font-bold text-gray-700">DBI Sites</span>
            </div>
            <div class="flex-1 max-w-2xl mx-10">
                <input type="text" placeholder="Search your businesses..." class="w-full bg-gray-100 p-2 px-6 rounded-full border-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">U</div>
        </nav>

        <div class="max-w-6xl mx-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl text-gray-600">Start a new business</h1>
                <button class="text-gray-400">⋮</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <div onclick="openModal()" class="cursor-pointer group">
                    <div class="aspect-[3/4] bg-white border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center group-hover:border-blue-500 transition">
                        <span class="text-5xl text-gray-300 group-hover:text-blue-500">+</span>
                    </div>
                    <p class="mt-2 text-sm font-medium text-center text-gray-700">Blank Business</p>
                </div>
            </div>

            <h2 class="text-xl mt-12 mb-6 font-bold">Your Live Businesses</h2>
            <div id="businessContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between">
                <h3 class="text-xl font-bold">Business Setup</h3>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="bTitle" placeholder="Business Title" class="w-full p-3 border rounded-lg outline-none">
                <textarea id="bDesc" placeholder="Description" class="w-full p-3 border rounded-lg outline-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="bPrice" placeholder="Money Level (Price)" class="p-3 border rounded-lg outline-none">
                    <select id="bCountry" class="p-3 border rounded-lg outline-none">
                        <option>USA (USD)</option>
                        <option>UK (GBP)</option>
                        <option>Bangladesh (BDT)</option>
                        <option>India (INR)</option>
                    </select>
                </div>
                <div class="border-2 border-dashed p-4 text-center rounded-lg text-gray-400">
                    <input type="file" id="bPhoto" class="hidden">
                    <label for="bPhoto" class="cursor-pointer">Add Photo +</label>
                </div>
                <button onclick="finishBusiness()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">DONE & PUBLISH</button>
            </div>
        </div>
    </div>

    <script>
        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startVerification() {
            window.open('https://www.youtube.com/@Ultra-wk8ed', '_blank');
            document.getElementById('subBtn').classList.add('hidden');
            document.getElementById('loadingBox').classList.remove('hidden');
            document.getElementById('loadingBox').classList.add('flex');

            let timeLeft = 15;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = "Checking: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showStep('step2');
                }
            }, 1000);
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function finishBusiness() {
            const title = document.getElementById('bTitle').value;
            const desc = document.getElementById('bDesc').value;
            const price = document.getElementById('bPrice').value;
            const country = document.getElementById('bCountry').value;
            
            if(!title || !price) return alert("Please fill title and price");

            const card = `
                <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
                    <div class="h-40 bg-gray-200 flex items-center justify-center text-gray-400 font-bold">PHOTO HERE</div>
                    <div class="p-4">
                        <div class="flex justify-between items-start">
                            <h4 class="text-lg font-bold">${title}</h4>
                            <span class="text-blue-600 font-bold">${price}</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-1">${country}</p>
                        <p class="text-gray-600 text-sm mb-4">${desc}</p>
                        <button onclick="window.open('https://wa.me/YOURNUMBER')" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold hover:bg-green-600 transition">BUY / CONTACT OWNER</button>
                    </div>
                </div>
            `;

            document.getElementById('businessContainer').innerHTML += card;
            closeModal();
            // Clear inputs
            document.getElementById('bTitle').value = "";
            document.getElementById('bDesc').value = "";
            document.getElementById('bPrice').value = "";
        }
    </script>
</body>
</html>
